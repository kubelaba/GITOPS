apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/'
    chart: infisical-standalone
    targetRevision: "1.4.0"
    helm:
      values: |
        infisical:
          enabled: true
          replicaCount: 1
          kubeSecretRef: infisical-secrets
          ingress:
            enabled: false

        postgresql:
          enabled: true
          auth:
            username: infisical
            database: infisicalDB
          useExistingPostgresSecret:
            enabled: true
            existingConnectionStringSecret:
              name: infisical-postgres-secret
              key: connection-string

        redis:
          enabled: true
          architecture: standalone
          auth:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: infisical

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
